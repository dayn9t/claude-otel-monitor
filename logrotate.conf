# Logrotate config for Claude Code metrics
# Usage: copy to /etc/logrotate.d/claude-metrics
# Or run manually: logrotate -f /path/to/this/file

/data/claude-metrics.json {
    daily
    rotate 30
    dateext
    dateformat -%Y%m%d
    compress
    delaycompress
    copytruncate
    missingok
    notifempty
}
